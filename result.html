<!DOCTYPE html>
<html>

<head>
    <title>Resume Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>

<body id="body" class="bg-gray-900 text-white p-6 transition">

    <div class="absolute top-5 right-5">
        <button onclick="toggleMode()" class="bg-indigo-500 px-4 py-2 rounded">
            🌙 / ☀️
        </button>
    </div>

    <h1 class="text-3xl font-bold mb-6 text-center">📊 Resume Dashboard</h1>

    <div class="grid grid-cols-1 md:grid-cols-2 gap-6">

        <!-- Profile -->
        <div class="bg-white/10 p-6 rounded-xl backdrop-blur">
            <h2 class="text-xl mb-4">👤 Profile</h2>
            <p><b>Name:</b> {{ data.name }}</p>
            <p><b>Email:</b> {{ data.email }}</p>
            <p><b>Phone:</b> {{ data.phone }}</p>
        </div>

        <!-- Skills -->
        <div class="bg-white/10 p-6 rounded-xl backdrop-blur">
            <h2 class="text-xl mb-4">🧠 Skills</h2>

            {% for skill in data.skills %}
            <div class="mb-3">
                <p>{{ skill }}</p>
                <div class="w-full bg-gray-700 h-2 rounded">
                    <div class="bg-indigo-500 h-2 rounded" style="width: 80%"></div>
                </div>
            </div>
            {% endfor %}
        </div>

    </div>

    <!-- SCORE -->
    <div class="mt-8 bg-white/10 p-6 rounded-xl text-center">
        <h2 class="text-xl mb-4">📈 Resume Score</h2>

        <div class="w-full bg-gray-700 h-4 rounded">
            <div class="h-4 rounded" style="width: {{ data.score }}%;
             background-color:
             {% if data.score < 40 %} red
             {% elif data.score < 70 %} orange
             {% else %} green
             {% endif %};">
            </div>
        </div>

        <p class="mt-2 text-lg font-bold">{{ data.score }}/100</p>
    </div>

    <div class="text-center mt-6">
        <a href="/" class="bg-indigo-500 px-6 py-2 rounded">
            Upload Another
        </a>
    </div>

    <script>
        function toggleMode() {
            let body = document.getElementById("body");
            body.classList.toggle("bg-gray-900");
            body.classList.toggle("bg-white");
            body.classList.toggle("text-white");
            body.classList.toggle("text-black");
        }
    </script>

</body>

</html>
